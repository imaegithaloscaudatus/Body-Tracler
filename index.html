<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>體態紀錄</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F7F5F0;color:#2C2C2A;min-height:100vh;}
.app{max-width:460px;margin:0 auto;padding:16px 16px 40px;}
.header{text-align:center;padding:24px 0 14px;}
.header h1{font-size:20px;font-weight:500;color:#2C2C2A;letter-spacing:.02em;}
.header p{font-size:13px;color:#888780;margin-top:4px;}
.status-bar{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:#888780;margin-bottom:20px;}
.dot{width:7px;height:7px;border-radius:50%;background:#639922;display:inline-block;flex-shrink:0;}
.dot.loading{background:#EF9F27;animation:pulse 1.2s ease-in-out infinite;}
.dot.error{background:#E24B4A;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
.metric{background:#fff;border-radius:10px;padding:14px 8px;text-align:center;border:0.5px solid rgba(0,0,0,.06);}
.mlabel{font-size:11px;color:#888780;margin-bottom:6px;}
.mvalue{font-size:24px;font-weight:500;color:#2C2C2A;line-height:1.1;}
.munit{font-size:11px;color:#B4B2A9;margin-top:2px;}
.mdelta{font-size:11px;margin-top:5px;}
.good{color:#3B6D11;}.bad{color:#A32D2D;}.neutral{color:#B4B2A9;}

.tab-row{display:flex;gap:6px;margin-bottom:12px;}
.tab{font-size:12px;padding:6px 14px;border-radius:20px;border:0.5px solid #D3D1C7;background:transparent;color:#888780;cursor:pointer;}
.tab.active{background:#2C2C2A;color:#fff;border-color:#2C2C2A;}

.chart-wrap{background:#fff;border-radius:14px;padding:16px 12px 20px;margin-bottom:8px;border:0.5px solid rgba(0,0,0,.06);}
.chart-title{font-size:13px;color:#888780;margin-bottom:4px;padding:0 4px;}
.chart-note{font-size:11px;color:#B4B2A9;margin-bottom:12px;padding:0 4px;line-height:1.5;}
.chart-scroll{overflow:hidden;border-radius:8px;touch-action:pan-y;}
.chart-canvas-wrap{position:relative;height:280px;width:100%;}
.chart-hint{font-size:11px;color:#B4B2A9;text-align:center;margin-top:6px;}
.zoom-controls{display:flex;justify-content:center;gap:8px;margin-top:8px;}
.zoom-btn{font-size:11px;padding:5px 12px;border-radius:8px;border:0.5px solid #D3D1C7;background:#fff;color:#888780;cursor:pointer;}
.zoom-btn:hover{background:#F1EFE8;}

.legend-row{display:flex;gap:14px;justify-content:center;margin:14px 0 18px;font-size:11px;color:#888780;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;}
.legend-line{width:14px;height:2px;display:inline-block;}

.sec-label{font-size:11px;font-weight:500;color:#888780;margin-bottom:8px;letter-spacing:.06em;text-transform:uppercase;}

.records{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:16px;border:0.5px solid rgba(0,0,0,.06);}
.rec-row{display:grid;grid-template-columns:2.2fr 1fr 1fr 1fr;padding:10px 14px;font-size:13px;border-bottom:0.5px solid #F1EFE8;align-items:center;}
.rec-row:last-child{border-bottom:none;}
.rec-row.head{font-size:11px;color:#888780;background:#F7F5F0;}
.vpill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:12px;font-weight:500;}
.v-low{background:#EAF3DE;color:#27500A;}
.v-mid{background:#FAEEDA;color:#633806;}
.v-high{background:#FCEBEB;color:#791F1F;}
.empty{text-align:center;padding:40px 20px;color:#B4B2A9;font-size:13px;line-height:1.8;}


.goal-card{background:#FBF7EE;border:0.5px solid #E8DCC4;border-radius:12px;padding:14px 16px;margin-bottom:16px;font-size:12px;color:#7A6326;line-height:1.7;}
.goal-card b{color:#5C4A1C;}

.refresh-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;font-size:13px;border-radius:10px;border:0.5px solid #D3D1C7;background:transparent;color:#888780;cursor:pointer;}
.refresh-btn:hover{background:#F1EFE8;}
.last-upd{text-align:center;font-size:11px;color:#B4B2A9;margin-top:10px;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>體態紀錄</h1>
    <p>體重・體脂・內臟脂肪</p>
  </div>
  <div class="status-bar">
    <span class="dot loading" id="dot"></span>
    <span id="status-text">連線中…</span>
  </div>

  <div class="metrics">
    <div class="metric"><div class="mlabel">最新體重</div><div class="mvalue" id="m-w">—</div><div class="munit">kg</div><div class="mdelta neutral" id="d-w">—</div></div>
    <div class="metric"><div class="mlabel">體脂率</div><div class="mvalue" id="m-f">—</div><div class="munit">%</div><div class="mdelta neutral" id="d-f">—</div></div>
    <div class="metric"><div class="mlabel">內臟脂肪</div><div class="mvalue" id="m-v">—</div><div class="munit">等級</div><div class="mdelta neutral" id="d-v">—</div></div>
  </div>

  <div id="goal-card-wrap"></div>

  <div class="tab-row">
    <button class="tab active" onclick="switchMetric('weight',this)">體重</button>
    <button class="tab" onclick="switchMetric('fat',this)">體脂</button>
    <button class="tab" onclick="switchMetric('visceral',this)">內臟脂肪</button>
  </div>

  <div class="chart-wrap">
    <div class="chart-title" id="ctitle">體重趨勢（kg）</div>
    <div class="chart-note" id="cnote">曲線為平滑估計，非每日皆有實測值</div>
    <div class="chart-scroll" id="chart-scroll">
      <div class="chart-canvas-wrap" id="chart-canvas-wrap"><canvas id="myChart"></canvas></div>
    </div>
    <div class="chart-hint">← 左右拖曳查看目標趨勢，雙指/滾輪可縮放 →</div>
    <div class="zoom-controls">
      <button class="zoom-btn" onclick="resetZoomToData()">回到實測範圍</button>
      <button class="zoom-btn" onclick="zoomToGoal()">查看目標線</button>
    </div>
    <div class="legend-row" id="legend-row"></div>
  </div>

  <div class="sec-label">最近紀錄</div>
  <div class="records">
    <div class="rec-row head"><div>日期</div><div>體重</div><div>體脂</div><div>內臟</div></div>
    <div id="rec-body"><div class="empty">載入中…</div></div>
  </div>

  <button class="refresh-btn" onclick="loadData()">↻ 重新整理</button>
  <div class="last-upd" id="last-upd"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/date-fns@2.30.0/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
<script>
const SHEET_ID = '1-nN_OtLJWfLC0SyBhNaqV8awFENtEHSRCbHSCaPhOI0';
const RECORD_GVIZ = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=0`;
const GOAL_GVIZ   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=1142524404`;

let allRows = [];
let dataRows = [];
let noteRows = [];
let goal = null;
let curMetric = 'weight';
let chartInst = null;

const mCfg = {
  weight:   {title:'體重趨勢（kg）',   key:'weight',   color:'#1D9E75', unit:'kg'},
  fat:      {title:'體脂率趨勢（%）',  key:'fat',      color:'#D85A30', unit:'%'},
  visceral: {title:'內臟脂肪等級趨勢', key:'visceral', color:'#BA7517', unit:''}
};

function setDot(s){document.getElementById('dot').className='dot'+(s==='ok'?'':' '+s);}
function setStatus(t,s='ok'){document.getElementById('status-text').textContent=t;setDot(s);}

// gviz 回傳的日期儲存格格式為 "Date(2026,3,10)"（月份從0起算），數字格式為原始數值
function parseGvizDate(cell){
  if(!cell || cell.v===null || cell.v===undefined) return null;
  const v = cell.v;
  if(typeof v === 'string' && v.startsWith('Date(')){
    const parts = v.slice(5,-1).split(',').map(Number);
    return new Date(parts[0], parts[1], parts[2]);
  }
  // 萬一該欄被當成純文字（非日期型別儲存格），退而求其次嘗試解析 f 欄位顯示字串或 v
  const fallback = cell.f || String(v);
  const d = new Date(String(fallback).replace(/\//g,'-'));
  return isNaN(d) ? null : d;
}

function gvizCellNum(cell){
  if(!cell || cell.v===null || cell.v===undefined || cell.v==='') return null;
  const n = Number(cell.v);
  return isNaN(n) ? null : n;
}

function gvizCellStr(cell){
  if(!cell || cell.v===null || cell.v===undefined) return '';
  return String(cell.v).trim();
}

function formatDateStr(d){
  if(!d) return '';
  return (d.getMonth()+1)+'/'+d.getDate();
}

async function fetchGviz(url){
  const res = await fetch(url);
  if(!res.ok) throw new Error('HTTP '+res.status);
  const text = await res.text();
  // gviz 回傳格式為 google.visualization.Query.setResponse({...}); 需要剝除前後綴
  const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?\s*$/);
  if(!match) throw new Error('無法解析資料格式');
  return JSON.parse(match[1]);
}

async function loadData(){
  setStatus('連線中…','loading');
  try{
    const recJson = await fetchGviz(RECORD_GVIZ);
    const recRows = recJson.table.rows || [];

    allRows = recRows.map(row=>{
      const c = row.c || [];
      const dateObj = parseGvizDate(c[0]);
      const dateStr = dateObj ? formatDateStr(dateObj) : '';
      return {
        dateStr,
        dateObj,
        weight:   gvizCellNum(c[1]),
        fat:      gvizCellNum(c[2]),
        visceral: gvizCellNum(c[3]),
        note:     gvizCellStr(c[4])
      };
    }).filter(r=>r.dateStr && r.dateObj)
      .sort((a,b)=>a.dateObj-b.dateObj);

    dataRows = allRows.filter(r=>r.weight!==null || r.fat!==null || r.visceral!==null);
    noteRows = allRows.filter(r=>r.note);

    try{
      const goalJson = await fetchGviz(GOAL_GVIZ);
      const goalRows = goalJson.table.rows || [];
      if(goalRows.length){
        const gc = goalRows[0].c || [];
        const gDate = parseGvizDate(gc[0]);
        const gWeight = gvizCellNum(gc[1]);
        if(gDate && gWeight!==null){
          goal = { dateStr: formatDateStr(gDate), dateObj: gDate, weight: gWeight };
        } else { goal = null; }
      } else { goal = null; }
    }catch(e){ goal = null; }

    render();
    setStatus('已同步 · '+dataRows.length+' 筆紀錄'+(noteRows.length?'，'+noteRows.length+' 則事件':''));
    document.getElementById('last-upd').textContent='更新於 '+new Date().toLocaleTimeString('zh-TW');
  }catch(e){
    setStatus('讀取失敗：'+e.message,'error');
    document.getElementById('rec-body').innerHTML='<div class="empty">無法讀取資料<br>請確認 Google Sheet 已設為「知道連結的任何人可檢視」</div>';
  }
}

function dVal(arr,key){
  const v=arr.filter(r=>r[key]!==null);
  return v.length<2?null:(v[0][key]-v[1][key]);
}

function showDelta(val,id){
  const el=document.getElementById(id);
  if(val===null){el.textContent='—';el.className='mdelta neutral';return;}
  el.textContent=(val<0?'▼ ':'▲ +')+Math.abs(val).toFixed(1);
  el.className='mdelta '+(val<0?'good':'bad');
}

function render(){
  if(!dataRows.length)return;
  const sorted = [...dataRows].sort((a,b)=>b.dateObj-a.dateObj);
  const l = sorted[0];
  document.getElementById('m-w').textContent=l.weight!==null?l.weight.toFixed(1):'—';
  document.getElementById('m-f').textContent=l.fat!==null?l.fat.toFixed(1):'—';
  document.getElementById('m-v').textContent=l.visceral!==null?l.visceral.toFixed(0):'—';
  showDelta(dVal(sorted,'weight'),'d-w');
  showDelta(dVal(sorted,'fat'),'d-f');
  showDelta(dVal(sorted,'visceral'),'d-v');

  renderGoalCard(l);
  renderChart();
  renderRecords(sorted);
}

function renderGoalCard(latest){
  const wrap = document.getElementById('goal-card-wrap');
  if(!goal || latest.weight===null){ wrap.innerHTML=''; return; }
  const daysLeft = Math.round((goal.dateObj - new Date())/86400000);
  const toLose = (latest.weight - goal.weight).toFixed(1);
  if(daysLeft <= 0 || toLose <= 0){ wrap.innerHTML=''; return; }
  wrap.innerHTML = '<div class="goal-card">目標：<b>'+goal.dateStr+' 前達到 '+goal.weight+'kg</b>（還需 '+daysLeft+' 天，目前需再降 '+toLose+'kg）<br>圖上虛線為「等速假設」的參考線，僅供對照進度，<b>實際減脂過程本來就不是直線</b>，停滯期、回升都正常，請以長期趨勢為準。</div>';
}

function switchMetric(m,btn){
  curMetric=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderChart();
}

// 自訂 Chart.js plugin：在資料點旁畫小箭頭+文字標註事件
const eventAnnotationPlugin = {
  id: 'eventAnnotation',
  afterDatasetsDraw(chart) {
    const notes = chart.config._eventNotes;
    if (!notes || !notes.length) return;
    const { ctx, chartArea } = chart;
    const xScale = chart.scales.x;
    const yScale = chart.scales.y;
    if(!xScale || !yScale) return;

    ctx.save();
    ctx.beginPath();
    ctx.rect(chartArea.left, chartArea.top - 40, chartArea.width, chartArea.height + 80);
    ctx.clip();

    notes.forEach((n, i) => {
      // 該日期是否在目前可視 X 範圍內；不在範圍內就不畫，避免畫到圖外
      if(n.x < xScale.min || n.x > xScale.max) return;
      const x = xScale.getPixelForValue(n.x);

      // 若該點有實際數值，箭頭從該點出發；若只有備註（無體重值），固定畫在圖表上緣附近
      let anchorY;
      if(n.y !== null && n.y !== undefined){
        anchorY = yScale.getPixelForValue(n.y);
      } else {
        anchorY = chartArea.top + 14;
      }

      const dirUp = i % 2 === 0;
      const labelY = dirUp ? anchorY - 30 : anchorY + 30;
      const lineEndY = dirUp ? anchorY - 8 : anchorY + 8;

      ctx.strokeStyle = '#BA7517';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, lineEndY);
      ctx.lineTo(x, labelY + (dirUp ? 9 : -9));
      ctx.stroke();

      ctx.fillStyle = '#BA7517';
      ctx.beginPath();
      ctx.moveTo(x, lineEndY);
      ctx.lineTo(x - 3, lineEndY + (dirUp ? 5 : -5));
      ctx.lineTo(x + 3, lineEndY + (dirUp ? 5 : -5));
      ctx.closePath();
      ctx.fill();

      ctx.font = '10px -apple-system, sans-serif';
      ctx.fillStyle = '#7A6326';
      ctx.textAlign = 'center';
      ctx.textBaseline = dirUp ? 'bottom' : 'top';
      ctx.fillText(n.text, x, labelY + (dirUp ? 9 : -9));
    });
    ctx.restore();
  }
};

let lastChartContext = null; // 保存當次 render 的關鍵範圍，供按鈕呼叫

function computeYRangeForVisible(points, goalPoint, xMin, xMax){
  // 找出目前 X 可視範圍內的所有「真實資料點」與「目標點（若可見）」，依此動態算 Y 軸範圍
  const visibleY = points.filter(p=>p.y!==null && p.x>=xMin && p.x<=xMax).map(p=>p.y);
  if(goalPoint && goalPoint.x>=xMin && goalPoint.x<=xMax) visibleY.push(goalPoint.y);
  if(goalPoint && goalPoint.startX>=xMin && goalPoint.startX<=xMax) visibleY.push(goalPoint.startY);
  if(!visibleY.length){
    // fallback：用全部真實值
    const all = points.filter(p=>p.y!==null).map(p=>p.y);
    if(!all.length) return {min:0,max:100};
    visibleY.push(...all);
  }
  const min = Math.min(...visibleY), max = Math.max(...visibleY);
  const pad = Math.max((max-min)*0.15, 1);
  return { min: Math.floor(min-pad), max: Math.ceil(max+pad) };
}

function renderChart(){
  const cfg=mCfg[curMetric];
  document.getElementById('ctitle').textContent=cfg.title;

  const allDates = [...new Set([
    ...dataRows.map(r=>r.dateStr),
    ...noteRows.map(r=>r.dateStr)
  ])];
  const dateMap = {};
  allRows.forEach(r=>{ dateMap[r.dateStr] = r; });
  let sortedEntries = allDates
    .map(d=>({d, obj: dateMap[d].dateObj}))
    .sort((a,b)=>a.obj-b.obj)
    .slice(-90);

  if(!sortedEntries.length){ return; }

  const baseTime = sortedEntries[0].obj.getTime();
  const dayMs = 86400000;
  const points = sortedEntries.map(({d,obj}) => {
    const row = dateMap[d];
    const v = row[cfg.key];
    return { x: (obj.getTime()-baseTime)/dayMs, y: (v!==null && v!==undefined) ? v : null, dateStr: d, obj };
  });

  let goalPoint = null;
  let goalStartDateStr = null;
  if(goal && curMetric==='weight'){
    const lastValid = [...dataRows].filter(r=>r.weight!==null).sort((a,b)=>b.dateObj-a.dateObj)[0];
    if(lastValid && goal.dateObj > lastValid.dateObj){
      goalPoint = {
        x: (goal.dateObj.getTime()-baseTime)/dayMs, y: goal.weight,
        startX: (lastValid.dateObj.getTime()-baseTime)/dayMs, startY: lastValid.weight,
        dateStr: goal.dateStr, obj: goal.dateObj
      };
      goalStartDateStr = lastValid.dateStr;
    }
  }

  const validPoints = points.filter(p=>p.y!==null);
  const dataMinX = validPoints.length ? Math.min(...validPoints.map(p=>p.x)) : 0;
  const dataMaxX = validPoints.length ? Math.max(...validPoints.map(p=>p.x)) : 0;

  const segGapDays = [];
  const validIdx = points.map((p,i)=>p.y!==null?i:null).filter(i=>i!==null);
  for(let i=0;i<validIdx.length-1;i++){
    const a=validIdx[i], b=validIdx[i+1];
    segGapDays.push({ax:points[a].x, bx:points[b].x, gap:points[b].x-points[a].x});
  }

  if(chartInst){chartInst.destroy();}

  const mainDataset = {
    label: cfg.title,
    data: points.map(p=>({x:p.x, y:p.y})),
    borderColor: cfg.color,
    backgroundColor: cfg.color+'18',
    borderWidth: 2.5,
    pointRadius: points.map(p=>p.y!==null?4:0),
    pointHoverRadius: 5,
    pointBackgroundColor: cfg.color,
    fill: true,
    spanGaps: true,
    segment: {
      tension: (ctx) => {
        const seg = segGapDays.find(s => s.ax===ctx.p0.parsed.x && s.bx===ctx.p1.parsed.x);
        if(!seg) return 0;
        return seg.gap > 3 ? 0.35 : 0; // 超過3天無資料才用平滑曲線插值，否則忠實直線連接
      }
    }
  };

  const datasets = [mainDataset];
  if(goalPoint){
    datasets.push({
      label:'目標（等速參考）',
      data:[{x:goalPoint.startX,y:goalPoint.startY},{x:goalPoint.x,y:goalPoint.y}],
      borderColor:'#B4B2A9', borderDash:[5,4], borderWidth:1.5, pointRadius:0, fill:false, tension:0
    });
  }

  const eventNotes = points.map((p)=>{
    const row = dateMap[p.dateStr];
    return row && row.note ? {x:p.x, y:p.y, text:row.note} : null;
  }).filter(Boolean);

  // 完整資料範圍（含目標延伸），供 zoom 限制邊界用
  const allX = points.map(p=>p.x).concat(goalPoint ? [goalPoint.x] : []);
  const fullMinX = Math.min(...allX), fullMaxX = Math.max(...allX);

  // 預設可視窗：只涵蓋實測資料區間，左右各留 1.5 天緩衝；若實測資料只有 1 筆，給左右各 3 天空間
  const dataSpan = dataMaxX - dataMinX;
  const defaultPad = dataSpan > 0 ? Math.max(dataSpan*0.12, 1) : 3;
  const defaultMinX = Math.max(fullMinX, dataMinX - defaultPad);
  const defaultMaxX = Math.min(fullMaxX, dataMaxX + defaultPad);

  const yRange = computeYRangeForVisible(points, goalPoint, defaultMinX, defaultMaxX);

  chartInst=new Chart(document.getElementById('myChart'),{
    type:'line',
    data:{ datasets },
    plugins:[eventAnnotationPlugin],
    options:{
      responsive:true, maintainAspectRatio:false,
      layout:{ padding:{ top:36, bottom:36 } },
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            title:(items)=>{
              const idx = items[0]?.dataIndex;
              if(idx===undefined || idx===null) return '';
              const ds = items[0].dataset.label;
              if(ds==='目標（等速參考）'){
                return idx===0 ? goalStartDateStr : goalPoint.dateStr;
              }
              const p = points[idx];
              return p ? p.obj.toLocaleDateString('zh-TW') : '';
            },
            label:c=>{
              if(c.raw===null||c.raw.y===null||c.raw.y===undefined) return null;
              const label = c.dataset.label==='目標（等速參考）' ? '目標 ' : '';
              return ' '+label+Number(c.raw.y).toFixed(1)+cfg.unit;
            }
          }
        },
        zoom:{
          pan:{
            enabled:true, mode:'x',
            onPanComplete:({chart})=>{
              const {min,max} = chart.scales.x;
              const r = computeYRangeForVisible(points, goalPoint, min, max);
              chart.options.scales.y.min = r.min;
              chart.options.scales.y.max = r.max;
              chart.update('none');
            }
          },
          zoom:{
            wheel:{enabled:true}, pinch:{enabled:true}, mode:'x',
            onZoomComplete:({chart})=>{
              const {min,max} = chart.scales.x;
              const r = computeYRangeForVisible(points, goalPoint, min, max);
              chart.options.scales.y.min = r.min;
              chart.options.scales.y.max = r.max;
              chart.update('none');
            }
          },
          limits:{ x:{ min: fullMinX - 1, max: fullMaxX + 1 } }
        }
      },
      scales:{
        x:{
          type:'linear',
          min: defaultMinX, max: defaultMaxX,
          ticks:{
            font:{size:10}, color:'#888780',
            callback:(val)=> {
              const d = new Date(baseTime + val*dayMs);
              return (d.getMonth()+1)+'/'+d.getDate();
            },
            maxRotation:0, autoSkip:true, maxTicksLimit:6
          },
          grid:{color:'rgba(136,135,128,.08)'}
        },
        y:{
          min:yRange.min, max:yRange.max,
          ticks:{font:{size:10},color:'#888780',callback:v=>Number(v).toFixed(1)+cfg.unit},
          grid:{color:'rgba(136,135,128,.08)'}
        }
      }
    }
  });
  chartInst.config._eventNotes = eventNotes;
  chartInst.update();

  lastChartContext = { points, goalPoint, defaultMinX, defaultMaxX, fullMinX, fullMaxX };

  const legendWrap = document.getElementById('legend-row');
  let legendHtml = '<div class="legend-item"><span class="legend-line" style="background:'+cfg.color+'"></span>實測趨勢</div>';
  if(goalPoint) legendHtml += '<div class="legend-item"><span class="legend-line" style="background:#B4B2A9;border-top:2px dashed #B4B2A9;height:0"></span>目標參考線（非真實路徑）</div>';
  if(eventNotes.length) legendHtml += '<div class="legend-item">↑ 事件標記</div>';
  legendWrap.innerHTML = legendHtml;
}

function resetZoomToData(){
  if(!chartInst || !lastChartContext) return;
  const { points, goalPoint, defaultMinX, defaultMaxX } = lastChartContext;
  chartInst.options.scales.x.min = defaultMinX;
  chartInst.options.scales.x.max = defaultMaxX;
  const r = computeYRangeForVisible(points, goalPoint, defaultMinX, defaultMaxX);
  chartInst.options.scales.y.min = r.min;
  chartInst.options.scales.y.max = r.max;
  chartInst.update();
}

function zoomToGoal(){
  if(!chartInst || !lastChartContext) return;
  const { points, goalPoint, fullMinX, fullMaxX } = lastChartContext;
  if(!goalPoint){ return; }
  chartInst.options.scales.x.min = fullMinX;
  chartInst.options.scales.x.max = fullMaxX;
  const r = computeYRangeForVisible(points, goalPoint, fullMinX, fullMaxX);
  chartInst.options.scales.y.min = r.min;
  chartInst.options.scales.y.max = r.max;
  chartInst.update();
}

function vpill(v){
  if(v===null)return'—';
  const c=v<=9?'v-low':v<=14?'v-mid':'v-high';
  return'<span class="vpill '+c+'">'+Number(v).toFixed(0)+'</span>';
}

function renderRecords(sortedDesc){
  const body=document.getElementById('rec-body');
  if(!sortedDesc.length){body.innerHTML='<div class="empty">無資料</div>';return;}
  body.innerHTML=sortedDesc.slice(0,20).map(r=>
    '<div class="rec-row">'+
    '<div style="color:#888780;font-size:12px">'+r.dateStr+'</div>'+
    '<div>'+(r.weight!==null?r.weight.toFixed(1):'—')+'</div>'+
    '<div>'+(r.fat!==null?r.fat.toFixed(1)+'%':'—')+'</div>'+
    '<div>'+vpill(r.visceral)+'</div>'+
    '</div>'
  ).join('');
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
